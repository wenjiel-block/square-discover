name: SquareNearby
options:
  bundleIdPrefix: com.square.nearby
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  SquareNearby:
    type: application
    platform: iOS
    sources:
      - SquareNearby
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Square Nearby needs your location to find restaurants near you."
        INFOPLIST_KEY_NSCameraUsageDescription: "Square Nearby needs camera access to create food posts."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Square Nearby needs photo library access to share food photos."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Square Nearby needs microphone access to record food videos."
  SquareNearbyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SquareNearbyTests
    dependencies:
      - target: SquareNearby
  SquareNearbyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - SquareNearbyUITests
    dependencies:
      - target: SquareNearby
